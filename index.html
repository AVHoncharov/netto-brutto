
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Netto → Brutto (PL) калькулятор</title>
 <style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #f4f6f9, #e9eef5);
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }

  .card {
    width: 100%;
    max-width: 640px;
    background: white;
    padding: 32px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
  }

  h1 {
    margin-top: 0;
    font-size: 32px;
    line-height: 1.2;
  }

  label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    font-size: 15px;
  }

  input, select {
    width: 100%;
    padding: 14px 16px;
    font-size: 16px;
    border-radius: 12px;
    border: 1px solid #dcdcdc;
    transition: all 0.2s ease;
    background: #fafafa;
  }

  input:focus, select:focus {
    outline: none;
    border-color: #2563eb;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
  }

  .row {
    margin-top: 20px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 640px) {
    .grid {
      grid-template-columns: 1fr;
    }
  }

  .muted {
    color: #6b7280;
    font-size: 14px;
    margin-top: 6px;
  }

  .result {
    margin-top: 28px;
    padding: 20px;
    border-radius: 16px;
    background: #f3f6fb;
    border: 1px solid #e1e7f0;
  }

  .result strong {
    font-size: 28px;
    font-weight: 700;
    display: block;
    margin-top: 6px;
  }

  .warn {
    color: #dc2626;
    font-size: 14px;
    margin-top: 8px;
  }

  code {
    background: #eef2f7;
    padding: 3px 6px;
    border-radius: 6px;
    font-size: 13px;
  }
</style>
</head>
<body>
  <div class="card">
    <h1 style="margin-top:0;">Netto → Brutto</h1>

    <div class="row">
      <label for="netto">Netto (zł)</label>
      <input id="netto" type="number" inputmode="decimal" step="0.01" placeholder="Введите Netto, например 5000" />
      <div class="muted">
        Используется формула: <code>Netto = Brutto - 9%*Brutto - PIT*(Brutto - KUP)</code>
      </div>
    </div>

    <div class="row grid">
      <div>
        <label for="pit">Ставка PIT</label>
        <select id="pit">
          <option value="0.12">12%</option>
          <option value="0.32">32%</option>
        </select>
      </div>
      <div>
        <label for="kup">KUP (zł)</label>
        <input id="kup" type="number" inputmode="numeric" step="1" value="250" />
        <div class="muted">Обычно 250 zł/мес (стандарт).</div>
      </div>
    </div>

    <div class="result" id="result">
      Brutto: <strong id="bruttoOut">—</strong>
      <div class="muted" id="formulaOut"></div>
      <div class="warn" id="warn" style="display:none;"></div>
    </div>
  </div>

<script>
  const nettoEl = document.getElementById('netto');
  const pitEl = document.getElementById('pit');
  const kupEl = document.getElementById('kup');

  const bruttoOut = document.getElementById('bruttoOut');
  const formulaOut = document.getElementById('formulaOut');
  const warnEl = document.getElementById('warn');

  function round2(n) {
    return Math.round((n + Number.EPSILON) * 100) / 100;
  }

  function fmt(n) {
    return new Intl.NumberFormat('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
  }

function nettoFromBrutto(brutto, pitRate, kup) {
  const zdrowotna = round2(0.09 * brutto);

  let pitBase = brutto - kup;

  pitBase = Math.round(pitBase);

  // PIT
  let pit = pitRate * pitBase;

  // round to zł
  pit = Math.round(pit);

  const netto = round2(brutto - zdrowotna - pit);

  return { netto, zdrowotna, pitBase, pit };
}
  function bruttoFromNetto(targetNetto, pitRate, kup) {
    let lo = 0;
    let hi = Math.max(1000, targetNetto * 3);

    for (let i = 0; i < 30; i++) {
      const { netto } = nettoFromBrutto(hi, pitRate, kup);
      if (netto >= targetNetto) break;
      hi *= 2;
    }

    for (let i = 0; i < 60; i++) {
      const mid = (lo + hi) / 2;
      const { netto } = nettoFromBrutto(mid, pitRate, kup);

      if (netto < targetNetto) lo = mid;
      else hi = mid;
    }

    
    const base = round2(hi);
    const candidates = [
      round2(base - 0.02),
      round2(base - 0.01),
      base,
      round2(base + 0.01),
      round2(base + 0.02),
    ].filter(x => x >= 0);

    let best = candidates[0];
    let bestDiff = Infinity;

    for (const b of candidates) {
      const { netto } = nettoFromBrutto(b, pitRate, kup);
      const diff = Math.abs(netto - targetNetto);
      if (diff < bestDiff) {
        bestDiff = diff;
        best = b;
      }
    }

    return best;
  }

  function recalc() {
    warnEl.style.display = 'none';
    warnEl.textContent = '';

    const raw = nettoEl.value.trim();
    const pitRate = Number(pitEl.value);
    const kup = Number(kupEl.value);

    if (raw === '') {
      bruttoOut.textContent = '—';
      formulaOut.textContent = '';
      return;
    }

    const targetNetto = round2(Number(raw));
    if (!Number.isFinite(targetNetto) || !Number.isFinite(pitRate) || !Number.isFinite(kup)) {
      bruttoOut.textContent = '—';
      formulaOut.textContent = '';
      return;
    }

    const brutto = bruttoFromNetto(targetNetto, pitRate, kup);
    const breakdown = nettoFromBrutto(brutto, pitRate, kup);

    bruttoOut.textContent = fmt(brutto);

    formulaOut.textContent =
      `Шаги (с округлением): zdrowotna=9% → ${fmt(breakdown.zdrowotna)} zł, ` +
      `PIT база=(Brutto-KUP) → ${fmt(breakdown.pitBase)} zł, ` +
      `PIT=${Math.round(pitRate*100)}% → ${fmt(breakdown.pit)} zł. ` +
      `Проверка Netto: ${fmt(breakdown.netto)} zł`;

    if (Math.abs(breakdown.netto - targetNetto) > 0.01) {
      warnEl.style.display = 'block';
      warnEl.textContent = 'Не удалось попасть точно в 0.01 zł из-за округлений. Попробуй уточнить правила округления в твоём источнике.';
    }
  }

  nettoEl.addEventListener('input', recalc);
  pitEl.addEventListener('change', recalc);
  kupEl.addEventListener('input', recalc);

  recalc();
</script>
</body>
</html>
